server:
  port: 8080
  tomcat:
    threads:
      max: 300
      min-spare: 20
    accept-count: 200
    max-connections: 10000
    connection-timeout: 20s

spring:
  application:
    name: edu-api
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: jdbc:mysql://localhost:3306/edu_saas?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useServerPrepStmts=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&rewriteBatchedStatements=true
    username: root
    password:
    hikari:
      pool-name: EduSaasHikari
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 3000
      validation-timeout: 2000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      leak-detection-threshold: 60000
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 5
          max-wait: 3000ms
  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false
  flyway:
    enabled: true
    baseline-on-migrate: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

edu:
  tenant:
    mode: shared-table
  organization:
    default-code: demo
    base-domain: ""
  observability:
    slow-request-threshold-ms: 1000
    access-log-enabled: true
  security:
    jwt:
      secret: ${JWT_SECRET:please-set-jwt-secret-in-environment-variable}
      access-token-minutes: 120
      refresh-token-days: 14
  payment:
    callback-secret: ${PAYMENT_CALLBACK_SECRET:please-set-callback-secret-in-environment-variable}
    compensation:
      enabled: true
      fixed-delay-ms: 60000
      initial-delay-ms: 30000
      batch-size: 100
      max-check-count: 12
  license:
    # 本地开发默认关闭授权校验，私有化交付走 application-private.yml（默认开启）
    enabled: ${LICENSE_ENABLED:false}
    public-key: ${LICENSE_PUBLIC_KEY:}
    file: ${LICENSE_FILE:}
    fingerprint: ${LICENSE_FINGERPRINT:}

# MyBatis配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置
logging:
  level:
    com.edusphere: INFO
    com.edusphere.*.mapper: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
