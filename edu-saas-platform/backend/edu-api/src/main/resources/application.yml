server:
  port: 8080
  tomcat:
    threads:
      max: 300
      min-spare: 20
    accept-count: 200
    max-connections: 10000
    connection-timeout: 20s

spring:
  application:
    name: edu-api
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: jdbc:mysql://localhost:3306/edu_saas?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password:
    hikari:
      pool-name: EduSaasHikari
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 3000
      validation-timeout: 2000
      idle-timeout: 600000
      max-lifetime: 1800000
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
    validate-on-migrate: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

edu:
  tenant:
    mode: shared-table
  organization:
    default-code: demo
    base-domain: ""
  observability:
    slow-request-threshold-ms: 1000
    access-log-enabled: true
  security:
    jwt:
      secret: ${JWT_SECRET:please-set-jwt-secret-in-environment-variable}
      access-token-minutes: 120
      refresh-token-days: 14
  payment:
    callback-secret: ${PAYMENT_CALLBACK_SECRET:please-set-callback-secret-in-environment-variable}
    compensation:
      enabled: true
      fixed-delay-ms: 60000
      initial-delay-ms: 30000
      batch-size: 100
      max-check-count: 12
